<!DOCTYPE html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}Finance App{% endblock %}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Safe area para iPhone con notch */
    .safe-top {
      padding-top: env(safe-area-inset-top);
    }

    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Scrollbar dark */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 2px;
    }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen" x-data="{ mobileMenu: false }">

  <!-- ── TOP NAV (solo desktop) ── -->
  <nav
    class="hidden md:flex fixed top-0 left-0 right-0 z-50 bg-slate-900/80 backdrop-blur border-b border-slate-800 px-6 h-14 items-center justify-between">
    <span class="font-semibold text-brand-400 tracking-tight">💳 FinanceApp</span>
    <div class="flex gap-6 text-sm text-slate-400">
      <a href="/"
        class="hover:text-white transition {% if request.url.path == '/' %}text-white font-medium{% endif %}">Dashboard</a>
      <a href="/cards/"
        class="hover:text-white transition {% if '/cards' in request.url.path %}text-white font-medium{% endif %}">Tarjetas</a>
      <a href="/expenses/"
        class="hover:text-white transition {% if '/expenses' in request.url.path %}text-white font-medium{% endif %}">Gastos</a>
      <a href="/subscriptions/"
        class="hover:text-white transition {% if '/subscriptions' in request.url.path %}text-white font-medium{% endif %}">Fijos</a>
      <a href="/installments/"
        class="hover:text-white transition {% if '/installments' in request.url.path %}text-white font-medium{% endif %}">Meses</a>

      <a href="/ai/"
        class="hover:text-white transition {% if '/ai' in request.url.path %}text-white font-medium{% endif %}">Asistente
        IA</a>
    </div>
    <a href="/logout" class="text-xs text-slate-500 hover:text-red-400 transition">Salir</a>
  </nav>

  <!-- ── CONTENIDO ── -->
  <main class="md:pt-14 pb-20 md:pb-6 min-h-screen">
    {% block content %}{% endblock %}
  </main>

  <!-- ── BOTTOM NAV (mobile) ── -->
  <nav
    class="fixed bottom-0 left-0 right-0 z-50 md:hidden bg-slate-900/95 backdrop-blur border-t border-slate-800 safe-bottom">
    <div class="flex justify-around py-2">
      <a href="/" class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl
              {% if request.url.path == '/' %}text-brand-400{% else %}text-slate-500{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="text-[10px] font-medium">Inicio</span>
      </a>

      <a href="/cards/" class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl
              {% if '/cards' in request.url.path %}text-brand-400{% else %}text-slate-500{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
        </svg>
        <span class="text-[10px] font-medium">Tarjetas</span>
      </a>

      <!-- Botón central -->
      <a href="/expenses/nuevo" class="flex flex-col items-center -mt-5">
        <div
          class="w-14 h-14 rounded-full bg-brand-500 flex items-center justify-center shadow-lg shadow-brand-500/40 border-4 border-slate-950">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
        </div>
        <span class="text-[10px] font-medium text-slate-500 mt-1">Agregar</span>
      </a>

      <a href="/subscriptions/"
        class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl
              {% if '/subscriptions' in request.url.path or '/installments' in request.url.path %}text-brand-400{% else %}text-slate-500{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <span class="text-[10px] font-medium">Fijos</span>
      </a>

      <a href="/ai/" class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl
              {% if '/ai' in request.url.path %}text-brand-400{% else %}text-slate-500{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
        </svg>
        <span class="text-[10px] font-medium">IA</span>
      </a>
    </div>
  </nav>

  <!-- ── LOADING SYSTEM ── -->
  <!-- Overlay global -->
  <div id="loading-overlay" class="fixed inset-0 z-[100] bg-slate-950/80 backdrop-blur-sm
              flex flex-col items-center justify-center
              opacity-0 pointer-events-none transition-opacity duration-200">
    <div class="flex flex-col items-center gap-4">
      <!-- Spinner -->
      <div class="relative w-14 h-14">
        <div class="absolute inset-0 rounded-full border-4 border-slate-700"></div>
        <div class="absolute inset-0 rounded-full border-4 border-transparent
                          border-t-sky-500 animate-spin"></div>
        <div class="absolute inset-2 rounded-full border-4 border-transparent
                          border-t-violet-500 animate-spin"
          style="animation-duration:0.6s; animation-direction:reverse">
        </div>
      </div>
      <!-- Mensaje dinámico -->
      <div class="text-center">
        <p id="loading-message" class="text-white font-medium text-sm">Guardando...</p>
        <p id="loading-sub" class="text-slate-500 text-xs mt-1">Por favor espera</p>
      </div>
    </div>
  </div>

  <!-- Toast de éxito -->
  <div id="toast-success" class="fixed top-5 left-1/2 -translate-x-1/2 z-[110]
              bg-emerald-500/10 border border-emerald-500/30 text-emerald-400
              px-5 py-3 rounded-2xl text-sm font-medium flex items-center gap-2
              opacity-0 pointer-events-none transition-all duration-300 -translate-y-2 shadow-xl">
    <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd"
        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
        clip-rule="evenodd" />
    </svg>
    <span id="toast-message">¡Guardado!</span>
  </div>

  <script>
    // ── Loading Manager ──────────────────────────────────────────
    const Loading = {
      overlay: document.getElementById('loading-overlay'),
      message: document.getElementById('loading-message'),
      sub: document.getElementById('loading-sub'),

      show(msg = 'Cargando...', sub = 'Por favor espera') {
        this.message.textContent = msg
        this.sub.textContent = sub
        this.overlay.classList.remove('opacity-0', 'pointer-events-none')
        this.overlay.classList.add('opacity-100')
      },

      hide() {
        this.overlay.classList.add('opacity-0', 'pointer-events-none')
        this.overlay.classList.remove('opacity-100')
      }
    }

    // ── Toast Manager ────────────────────────────────────────────
    const Toast = {
      el: document.getElementById('toast-success'),
      msg: document.getElementById('toast-message'),
      timer: null,

      show(msg = '¡Listo!', duration = 2500) {
        this.msg.textContent = msg
        this.el.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-2')
        this.el.classList.add('opacity-100', 'translate-y-0')
        clearTimeout(this.timer)
        this.timer = setTimeout(() => this.hide(), duration)
      },

      hide() {
        this.el.classList.add('opacity-0', 'pointer-events-none', '-translate-y-2')
        this.el.classList.remove('opacity-100', 'translate-y-0')
      }
    }

    // ── Mensajes por tipo de acción ──────────────────────────────
    const ACTION_MESSAGES = {
      // Gastos
      '/expenses/nuevo': { msg: 'Guardando gasto...', sub: 'Calculando periodo de TDC' },
      '/expenses/scan/guardar': { msg: 'Guardando ticket...', sub: 'Asignando a tu tarjeta' },
      '/expenses/ocr': { msg: 'Analizando con Gemini ✨', sub: 'Extrayendo datos del ticket' },
      // Tarjetas
      '/cards/nuevo': { msg: 'Creando tarjeta...', sub: 'Configurando fechas de corte' },
      '/cards/editar': { msg: 'Actualizando tarjeta...', sub: 'Guardando cambios' },
      // Suscripciones
      '/subscriptions/nuevo': { msg: 'Guardando suscripción...', sub: 'Generando cargo del mes actual' },
      '/subscriptions/toggle': { msg: 'Actualizando...', sub: '' },
      '/subscriptions/eliminar': { msg: 'Eliminando...', sub: '' },
      // MSI
      '/installments/nuevo': { msg: 'Creando plan MSI...', sub: 'Calculando cuotas mensuales' },
      '/installments/eliminar': { msg: 'Eliminando plan...', sub: 'Borrando gastos generados' },
      // IA
      '/ai/analyze': { msg: 'Consultando a Gemini ✨', sub: 'Analizando tus finanzas...' },
      // Navegación
      'navigation': { msg: 'Cargando...', sub: '' },
    }

    function getActionMessage(url) {
      for (const [key, val] of Object.entries(ACTION_MESSAGES)) {
        if (url.includes(key)) return val
      }
      return { msg: 'Guardando...', sub: 'Por favor espera' }
    }

    // ── Interceptar todos los formularios ───────────────────────
    document.addEventListener('submit', function (e) {
      const form = e.target
      // Excluir forms de filtro (GET) y confirms cancelados
      if (form.method.toLowerCase() === 'get') return

      // Confirm dialogs — si el usuario cancela, no mostrar loader
      // (el confirm ya fue resuelto antes del submit si pasó hasta aquí)
      const action = form.action || window.location.href
      const { msg, sub } = getActionMessage(action)
      Loading.show(msg, sub)
    })

    // ── Interceptar navegación entre páginas ─────────────────────
    document.addEventListener('click', function (e) {
      const link = e.target.closest('a[href]')
      if (!link) return

      const href = link.getAttribute('href')
      // Ignorar: anclas, externos, logout (rápido), javascript:
      if (!href || href.startsWith('#') || href.startsWith('http') ||
        href === '/logout' || href.startsWith('javascript')) return

      // No mostrar en links de solo filtro
      if (href.includes('?')) return

      Loading.show('Cargando...', '')
    })

    // ── Patch global fetch (para llamadas desde Alpine/JS) ───────
    const _originalFetch = window.fetch
    window.fetch = async function (url, options = {}) {
      const method = (options.method || 'GET').toUpperCase()

      // Solo mostrar loader en POST/PUT (no en GETs de datos)
      const isDataFetch = typeof url === 'string' && (
        url.includes('/dashboard/data') ||
        url.includes('/ai/data')
      )

      if (method !== 'GET' && !isDataFetch) {
        const { msg, sub } = getActionMessage(typeof url === 'string' ? url : '')
        Loading.show(msg, sub)
      }

      try {
        const response = await _originalFetch(url, options)
        return response
      } finally {
        // El hide lo maneja cada componente Alpine para mejor UX
        if (method === 'GET') Loading.hide()
      }
    }

    // ── Ocultar loader cuando la página carga completa ───────────
    window.addEventListener('pageshow', () => Loading.hide())
    window.addEventListener('load', () => Loading.hide())

    // ── Exponer globalmente para Alpine ──────────────────────────
    window.Loading = Loading
    window.Toast = Toast
  </script>
</body>

</html>
