{% extends "base.html" %}
{% block title %}Escanear Ticket{% endblock %}

{% block content %}
<div class="px-4 pt-6 max-w-lg mx-auto" x-data="scanner()" x-init="init()">

  <div class="flex items-center gap-3 mb-6">
    <a href="/expenses/" class="text-slate-500 hover:text-white transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h2 class="text-xl font-bold text-white">Escanear Ticket</h2>
  </div>

  <!-- Step 1: Captura -->
  <div x-show="step === 1" class="space-y-4">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 text-center">
      <!-- Preview imagen -->
      <div x-show="previewUrl" class="mb-4">
        <img :src="previewUrl" class="max-h-64 mx-auto rounded-xl object-contain">
      </div>

      <!-- Placeholder sin imagen -->
      <div x-show="!previewUrl"
        class="h-48 flex flex-col items-center justify-center border-2 border-dashed border-slate-700 rounded-xl mb-4 cursor-pointer"
        @click="$refs.fileInput.click()">
        <svg class="w-12 h-12 text-slate-600 mb-3" fill="none" stroke="currentColor" stroke-width="1.5"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
        </svg>
        <p class="text-slate-500 text-sm">Toca para tomar foto o seleccionar</p>
      </div>

      <!-- Inputs archivo -->
      <div class="grid grid-cols-2 gap-3">
        <button type="button" @click="openCamera()" class="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700
                               text-white text-sm font-medium py-3 rounded-xl transition">
          📷 Cámara
        </button>
        <button type="button" @click="$refs.fileInput.click()" class="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700
                               text-white text-sm font-medium py-3 rounded-xl transition">
          🖼️ Galería
        </button>
      </div>

      <input type="file" x-ref="fileInput" accept="image/*" class="hidden" @change="handleFile($event)">
      <input type="file" x-ref="cameraInput" accept="image/*" capture="environment" class="hidden"
        @change="handleFile($event)">
    </div>

    <button type="button" @click="analyze()" :disabled="!imageFile || loading" class="w-full bg-violet-500 hover:bg-violet-400 disabled:opacity-40 disabled:cursor-not-allowed
                       text-white font-semibold py-3.5 rounded-xl transition flex items-center justify-center gap-2">
      <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
      </svg>
      <span x-text="loading ? 'Analizando con IA...' : '✨ Analizar con Gemini'"></span>
    </button>
  </div>

  <!-- Step 2: Confirmar datos extraídos -->
  <div x-show="step === 2">
    <div class="bg-violet-500/10 border border-violet-500/20 rounded-2xl p-4 mb-4 flex items-start gap-3">
      <span class="text-2xl">✨</span>
      <div>
        <p class="text-sm font-medium text-violet-300">Gemini extrajo estos datos</p>
        <p class="text-xs text-slate-500 mt-0.5">Revisa y corrige si es necesario antes de guardar</p>
      </div>
    </div>

    <form method="post" action="/expenses/scan/guardar" class="space-y-4">

      <!-- Tarjeta -->
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4">
        <label class="block text-xs font-medium text-slate-400 mb-2">Tarjeta</label>
        <select name="card_id" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white
                               focus:outline-none focus:border-sky-500 transition">
          {% for card in cards %}
          <option value="{{ card.id }}">{{ card.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 space-y-4">
        <!-- Comercio -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">Comercio</label>
          <input type="text" name="merchant" :value="ocr.merchant || ''" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white
                                  focus:outline-none focus:border-sky-500 transition">
        </div>
        <!-- Fecha -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">Fecha</label>
          <input type="date" name="expense_date" :value="ocr.date || '{{ today }}'" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white
                                  focus:outline-none focus:border-sky-500 transition">
        </div>
        <!-- Monto -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">Monto total</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">$</span>
            <input type="number" name="amount" step="0.01" :value="ocr.amount || ''" class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-8 pr-4 py-3 text-sm text-white
                                      focus:outline-none focus:border-sky-500 transition">
          </div>
        </div>
        <!-- IVA -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">Impuestos</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">$</span>
            <input type="number" name="tax_amount" step="0.01" :value="ocr.tax_amount || 0" class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-8 pr-4 py-3 text-sm text-white
                                      focus:outline-none focus:border-sky-500 transition">
          </div>
        </div>
        <!-- Categoría -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">Categoría</label>
          <select name="category" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white
                                   focus:outline-none focus:border-sky-500 transition">
            {% for cat in ['Alimentación','Transporte','Entretenimiento','Salud','Ropa','Tecnología','Hogar','Otro'] %}
            <option value="{{ cat }}" x-bind:selected="ocr.category === '{{ cat }}'">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Confianza OCR -->
      <div x-show="ocr.confidence" class="flex items-center gap-2 px-2">
        <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden">
          <div class="h-full bg-emerald-500 rounded-full transition-all"
            :style="`width: ${(ocr.confidence || 0) * 100}%`"></div>
        </div>
        <span class="text-xs text-slate-500" x-text="`${Math.round((ocr.confidence || 0) * 100)}% confianza`"></span>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button type="button" @click="step = 1"
          class="bg-slate-800 hover:bg-slate-700 text-white font-medium py-3 rounded-xl transition">
          ← Volver
        </button>
        <button type="submit" class="bg-sky-500 hover:bg-sky-400 text-white font-semibold py-3 rounded-xl transition">
          Guardar ✓
        </button>
      </div>
    </form>
  </div>

  <!-- Error OCR -->
  <div x-show="ocrError" class="mt-4 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm"
    x-text="ocrError"></div>
</div>

<script>
  function scanner() {
    return {
      step: 1,
      imageFile: null,
      previewUrl: null,
      loading: false,
      ocr: {},
      ocrError: null,

      init() { },

      openCamera() {
        this.$refs.cameraInput.click()
      },

      handleFile(event) {
        const file = event.target.files[0]
        if (!file) return
        this.imageFile = file
        this.previewUrl = URL.createObjectURL(file)
        this.ocrError = null
      },

      async analyze() {
        if (!this.imageFile) return
        this.ocrError = null
        // Loading ya se activa desde el fetch interceptado

        try {
          const formData = new FormData()
          formData.append('image', this.imageFile)

          const res = await fetch('/expenses/ocr', { method: 'POST', body: formData })
          const data = await res.json()

          Loading.hide()

          if (data.error) {
            this.ocrError = `Error: ${data.error}`
          } else {
            this.ocr = data
            this.step = 2
            Toast.show('✨ Ticket analizado correctamente')
          }
        } catch (e) {
          Loading.hide()
          this.ocrError = 'Error de conexión. Intenta de nuevo.'
        }
      },
    }
  }
</script>
{% endblock %}
